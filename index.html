<!DOCTYPE html>
<html>
<head>
    <title>Duck Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topBar">
    <div id="moneyDisplay">Coins: 0</div>
    <div id="prestigeDisplay">Prestige: 0</div>
    <button id="shopBtn">Shop</button>
    <button id="adminBtn">Admin</button>
    <button id="settingsBtn">Settings</button>
</div>

<div id="duckContainer">
    <div id="duck"></div>
</div>

<div id="floatingTextContainer"></div>

<!-- SHOP -->
<div id="shop" class="panel hidden">
    <div class="panel-header">
        <span>Shop</span>
        <button class="closeBtn" id="closeShop">✕</button>
    </div>
    <div class="panel-body">
        <button id="upgradeClick">Upgrade Click (+1) — 50 coins</button>
        <button id="autoClick">Buy Auto Clicker — 200 coins</button>
        <button id="buySkinBlue">Buy Blue Duck Skin — 500 coins</button>
        <button id="buySkinRed">Buy Red Duck Skin — 1000 coins</button>
        <button id="prestigeBtn">Prestige (Reset, +1 Prestige) — 5000 coins</button>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="panel hidden draggable">
    <div class="panel-header" id="adminHeader">
        <span>Admin Panel</span>
        <button class="closeBtn" id="closeAdmin">✕</button>
    </div>
    <div class="panel-body">
        <input id="adminCode" placeholder="Enter Code">
        <button id="submitCode">Unlock</button>

        <div id="adminTools" class="hidden">
            <button id="giveCoins">Give 10,000 Coins</button>
            <button id="removeCoins">Remove 10,000 Coins</button>
            <button id="setClickPower">Set Click Power to 10</button>
            <button id="resetGame">Reset Game</button>
            <button id="givePrestige">Give +1 Prestige</button>
        </div>
    </div>
</div>

<!-- SETTINGS -->
<div id="settingsPanel" class="panel hidden">
    <div class="panel-header">
        <span>Settings</span>
        <button class="closeBtn" id="closeSettings">✕</button>
    </div>
    <div class="panel-body">
        <button id="toggleSound">Toggle Sound</button>
        <button id="resetProgress">Reset Progress</button>
    </div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardPanel" class="panel hidden">
    <div class="panel-header">
        <span>Leaderboard</span>
        <button class="closeBtn" id="closeLeaderboard">✕</button>
    </div>
    <div class="panel-body">
        <div id="leaderboardList"></div>
        <button id="saveScore">Save Current Score</button>
    </div>
</div>

<script src="save.js"></script>
<script src="admin.js"></script>
<script src="script.js"></script>

</body>
</html>
